name: Last.fm Listening Reports

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      period:
        description: Report period to generate
        required: true
        default: weekly
        type: choice
        options:
          - weekly
          - monthly
          - yearly
          - all
  schedule:
    - cron: "0 13 * * 1" # Monday 22:00 KST
    - cron: "0 13 1 * *" # 1st day of month 22:00 KST
    - cron: "0 13 1 1 *" # Jan 1 22:00 KST

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: lastfm-reports
  cancel-in-progress: false

jobs:
  weekly:
    name: Weekly report
    if: github.event_name == 'workflow_dispatch' && (inputs.period == 'weekly' || inputs.period == 'all') || github.event.schedule == '0 13 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: data/lastfm-cache
          key: lastfm-cache-weekly-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            lastfm-cache-
      - name: Generate weekly report
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node work/lastfm-report-generator.mjs weekly
      - name: Validate report scripts
        run: npm run check:report
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/lastfm-reports data/lastfm-history
          git diff --cached --quiet || git commit -m "Add Last.fm weekly report"
          git push

  monthly:
    name: Monthly report
    if: github.event_name == 'workflow_dispatch' && (inputs.period == 'monthly' || inputs.period == 'all') || github.event.schedule == '0 13 1 * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: data/lastfm-cache
          key: lastfm-cache-monthly-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            lastfm-cache-
      - name: Generate monthly report
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node work/lastfm-report-generator.mjs monthly
      - name: Validate report scripts
        run: npm run check:report
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/lastfm-reports data/lastfm-history
          git diff --cached --quiet || git commit -m "Add Last.fm monthly report"
          git push

  yearly:
    name: Yearly report
    if: github.event_name == 'workflow_dispatch' && (inputs.period == 'yearly' || inputs.period == 'all') || github.event.schedule == '0 13 1 1 *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: data/lastfm-cache
          key: lastfm-cache-yearly-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            lastfm-cache-
      - name: Generate yearly report
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node work/lastfm-report-generator.mjs yearly
      - name: Validate report scripts
        run: npm run check:report
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/lastfm-reports data/lastfm-history
          git diff --cached --quiet || git commit -m "Add Last.fm yearly report"
          git push

  deploy-pages:
    name: Deploy GitHub Pages
    if: always() && !cancelled()
    needs:
      - weekly
      - monthly
      - yearly
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Pull generated reports
        run: git pull --ff-only
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: outputs/lastfm-reports
      - id: deployment
        uses: actions/deploy-pages@v4
